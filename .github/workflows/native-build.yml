name: Native Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Native platform to build
        required: true
        default: all
        type: choice
        options: [all, ios, android]
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options: [preview, production]

permissions:
  contents: read

jobs:
  build:
    name: Native release smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 21.0.0
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Build native app
        run: eas build --platform "$BUILD_PLATFORM" --profile "$BUILD_PROFILE" --non-interactive --wait
        env:
          BUILD_PLATFORM: ${{ inputs.platform }}
          BUILD_PROFILE: ${{ inputs.profile }}
