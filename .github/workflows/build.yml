name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Typecheck app
        run: npm run typecheck

      - name: Test app rules
        run: npm run test

  edge:
    name: Edge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.4

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-v2.1.4-${{ hashFiles('supabase/functions/**/*.ts', 'supabase/tests/**/*.ts') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Typecheck Edge Functions
        run: npm run typecheck:edge

      - name: Test Edge Functions
        run: npm run test:edge

  supabase-integration:
    name: Supabase Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.4

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-v2.1.4-${{ hashFiles('supabase/functions/**/*.ts', 'supabase/tests/**/*.ts') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Cache Supabase Docker images
        id: cache-supabase-images
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-images.tar
          key: ${{ runner.os }}-supabase-images-${{ hashFiles('package-lock.json', 'supabase/config.toml') }}

      - name: Load Supabase Docker images
        if: steps.cache-supabase-images.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-images.tar

      - name: Test Supabase integration
        run: npm run test:integration:supabase

      - name: Save Supabase Docker images
        if: success() && steps.cache-supabase-images.outputs.cache-hit != 'true'
        run: |
          images="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E '^public\.ecr\.aws/supabase/(postgres|gotrue|postgrest|kong|edge-runtime):' || true)"
          if [ -n "$images" ]; then
            docker save $images -o /tmp/supabase-images.tar
          fi

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Cache Supabase Docker images
        id: cache-supabase-images
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-images.tar
          key: ${{ runner.os }}-supabase-images-${{ hashFiles('package-lock.json', 'supabase/config.toml') }}

      - name: Load Supabase Docker images
        if: steps.cache-supabase-images.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-images.tar

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Test web E2E
        run: npm run test:e2e:web

      - name: Save Supabase Docker images
        if: success() && steps.cache-supabase-images.outputs.cache-hit != 'true'
        run: |
          images="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E '^public\.ecr\.aws/supabase/(postgres|gotrue|postgrest|kong|edge-runtime):' || true)"
          if [ -n "$images" ]; then
            docker save $images -o /tmp/supabase-images.tar
          fi

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
