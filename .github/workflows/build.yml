name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Typecheck app
        run: npm run typecheck

      - name: Test app rules
        run: npm run test

  edge:
    name: Edge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.0

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-2.9.0-${{ hashFiles('supabase/functions/**/*.ts', 'supabase/tests/**/*.ts') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Typecheck Edge Functions
        run: npm run typecheck:edge

      - name: Test Edge Functions
        run: npm run test:edge

  supabase-integration:
    name: Supabase Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.0

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-2.9.0-${{ hashFiles('supabase/functions/**/*.ts', 'supabase/tests/**/*.ts') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Test Supabase integration
        run: npm run test:integration:supabase

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Test web E2E
        run: npm run test:e2e:web

      - name: Stop Supabase
        if: always()
        run: npx supabase stop --no-backup || true

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  build-pages:
    name: Build GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Validate deployment config
        run: |
          test -n "$EXPO_PUBLIC_SUPABASE_URL" || { echo "::error::Set repository variable EXPO_PUBLIC_SUPABASE_URL before deploying GitHub Pages."; exit 1; }
          test -n "$EXPO_PUBLIC_SUPABASE_ANON_KEY" || { echo "::error::Set repository variable EXPO_PUBLIC_SUPABASE_ANON_KEY before deploying GitHub Pages."; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "::error::Set repository variable APPLE_TEAM_ID before deploying GitHub Pages."; exit 1; }
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - name: Build web
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - name: Add Apple associated domain file
        run: |
          mkdir -p dist/.well-known
          cat > dist/.well-known/apple-app-site-association <<EOF
          {
            "applinks": {
              "apps": [],
              "details": [
                {
                  "appIDs": ["${APPLE_TEAM_ID}.com.ejsmith.sucker"],
                  "components": [
                    { "/": "/invite/*" },
                    { "/": "/auth/callback" }
                  ]
                }
              ]
            }
          }
          EOF
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - name: Add custom domain
        run: echo "sucker.games" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages
    needs:
      - app
      - edge
      - supabase-integration
      - web-e2e
      - build-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
