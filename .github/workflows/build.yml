name: Build

on:
  pull_request:
  push:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck app
        run: npm run typecheck

      - name: Typecheck Edge Functions
        run: npm run typecheck:edge

      - name: Test app rules
        run: npm run test

      - name: Test Edge Functions
        run: npm run test:edge

      - name: Test Supabase integration
        run: npm run test:integration:supabase

      - name: Test web E2E
        run: npm run test:e2e:web

      - name: Stop Supabase
        if: always()
        run: npx supabase stop --no-backup || true
